<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>EduTech Impact on AI - Dashboard</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 700px; margin: 60px auto; color: #222; }
    h1 { color: #2F5496; }
    code { background: #f4f4f4; padding: 2px 6px; border-radius: 4px; }
  </style>
</head>
<body>
  <h1>EduTech Impact on AI</h1>
  <p>Backend is running. This page will become the live dashboard (Day 7-8).</p>
  <p>Check the API health route: <code>/api/health</code></p>

  <h2>Test upload (Day 2)</h2>
  <form id="uploadForm">
    <input type="file" name="file" accept=".csv,.xlsx,.xls" required>
    <button type="submit">Upload</button>
  </form>
  <pre id="result" style="background:#f4f4f4; padding:12px; white-space:pre-wrap;"></pre>

  <h2>Upload history</h2>
  <button onclick="loadBatches()">Refresh batch list</button>
  <pre id="batches" style="background:#f4f4f4; padding:12px; white-space:pre-wrap;"></pre>

  <script>
    document.getElementById('uploadForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const formData = new FormData(e.target);
      const res = await fetch('/api/upload', { method: 'POST', body: formData });
      const data = await res.json();
      document.getElementById('result').textContent = JSON.stringify(data, null, 2);
      loadBatches();
    });

    async function loadBatches() {
      const res = await fetch('/api/batches');
      const data = await res.json();
      document.getElementById('batches').textContent = JSON.stringify(data, null, 2);
    }
    loadBatches();
  </script>
</body>
</html>
